<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FONTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&display=swap');

        h1 {
            text-align: center;
            background-color: rgb(255, 251, 0);
            border: 2px solid rgb(73, 0, 128);
            padding: 20px;
            box-sizing: border-box;

            font-family: 'Times New Roman', Times, serif;
            /* font-family: "Baloo Bhai 2", sans-serif; */
            font-style: italic;
            font-size: 50px;
            text-decoration: underline;
            text-transform: capitalize ;
            text-decoration-style:dashed;
            text-decoration-color: aqua;
            text-decoration-thickness: 5px;
        }

        p {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-style: oblique;
            line-height: 4;
            text-transform:  lowercase;
            text-decoration: underline;
            text-decoration-color: red;
            text-decoration-style: dotted;
            text-decoration-thickness: 5px;
            text-align: justify;
        }

        .lorem {

            background-color: aqua;
            border: 2px solid purple;
            padding: 20px;
            width:148px ;
            word-break: break-all;
           /* text-overflow: ellipsis;
           overflow: hidden; */
        }

        .ex {
            background-color: rgb(255, 0, 8);
            border: 2px solid rgb(0, 128, 15);
            padding: 20px;
            box-sizing: border-box;

        }
    </style>

</head>

<body>
    <div>
        <h1>FONTS</h1>
        <p class="ex">this is a video on fonts </p>
        <p class="lorem">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Ab beatae laboriosam nisi quibusdam, possimus
            voluptate facere libero consequuntur reprehenderit neque quae adipisci quis ratione architecto aliquid
            expedita. Fugiat, natus autem?

        </p>
    </div>
</body>

</html>
