<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex-8</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;

        }
        .container{
            height: 80vh;
            width: 80vw;
            background-color: aquamarine;
            display: flex;
            flex-direction: column-reverse;
        }

        .ball{
            height: 50px;
            width: 50px;
            background-color: red;
            position: relative;
            justify-self: flex-end;
            border-radius: 50px;
           /* animation: name duration timing-function delay iteration-count direction fill-mode; */
           animation: xaxis 5s ease-in-out 2s infinite normal , yaxis 5s ease-in-out 2s infinite normal;
        }

@keyframes xaxis{
    form{

    }
    to{
        transform: translateX(500px);
    }
}

@keyframes yaxis{
    form{

    }
    to{
        transform: translateY(-500px);
    }
}


    </style>
</head>
<body>
    <div class="container">
        <div class="ball"></div>
    </div>
</body>
</html>
